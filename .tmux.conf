# Give Meta/Alt (Esc-prefixed) key sequences enough time to arrive as one event,
# so e.g. M-w in emacs copy-mode isn't swallowed as a standalone Escape (which
# cancels copy-mode) before the second byte shows up. 50ms is imperceptible for
# a real lone Escape press but enough to catch Esc+key bursts.
set-option -sg escape-time 50

# Set prefix key (default is C-b)
set-option -g prefix "C-\\"
unbind-key C-b
bind-key C-\\ send-prefix

# Improve colors
set-option -g default-terminal 'tmux-256color'

# Spawn every new pane/window as a login shell so ~/.bash_profile -> ~/.bashrc.ftw
# actually loads (aliases like .. and l, parse_git_branch, PS1, nvm, etc).
# Costs ~150ms per shell spawn, not an ongoing process — same as opening a new
# terminal tab. Only affects NEW panes/windows going forward, not ones already open.
set-option -g default-command "exec $SHELL -l"

# Set scrollback buffer to 999999
set-option -g history-limit 999999

# Enable scrolling with mouse
set-option -g mouse on

# Copy-mode navigation style (prefix + [ to enter, or mouse scroll).
# This ONLY affects copy-mode — never normal pane navigation.
# Default (both lines commented) is emacs-style. Uncomment ONE line to switch.
#
# emacs cheat-sheet (default, no line needed):
#   move:   arrows, C-b/C-f (char), C-p/C-n (line), M-b/M-f (word), C-a/C-e (line start/end)
#   select: C-Space to start, then move; copy with M-w (or C-w)
#   search: C-s forward, C-r backward
#   quit:   q or Escape
#
# vi cheat-sheet:
#   move:   h/j/k/l, w/b (word), 0/$ (line start/end), g/G (top/bottom), C-f/C-b (page)
#   select: v to start (V for line, C-v for block), then move; copy with y
#   search: / forward, ? backward
#   quit:   q or Escape
#
#set-window-option -g mode-keys emacs
#set-window-option -g mode-keys vi

# Customize the status line
set-option -g status-style fg=black,bg=yellow

# Highlight which pane is active
set-option -g pane-border-style fg=colour238
set-option -g pane-active-border-style fg=colour39

# Tried: show pane index/title on the border, and a bolder border line.
# Reverted — too noisy / ate too much vertical space.
#set-option -g pane-border-status top
#set-option -g pane-border-lines heavy

# Flag windows in the status bar when something happens in them in the background
set-window-option -g monitor-activity on
set-option -g visual-activity on

# Tried: start windows/panes at 1 instead of 0. Reverted — costs a usable
# prefix+<digit> quick-switch slot (windows would run 1-9 plus a two-key 10th,
# instead of using all 10 single-digit slots 0-9).
#set-option -g base-index 1
#set-option -g pane-base-index 1
set-window-option -g renumber-windows on

# Sync tmux copy-mode / mouse selections with the macOS clipboard
set-option -g set-clipboard on

# Manually force a client redraw (useful after resizing terminals, tmux -CC glitches, etc.)
# 'u' is unclaimed by tmux-sensible/pain-control/resurrect/continuum.
bind-key u refresh-client

# Toggle mirroring keystrokes to every pane in the window at once
# (e.g. running the same command across several SSH panes). Toggle again to undo.
bind-key y set-window-option synchronize-panes

# Floating scratch terminal, dismiss with C-d or exit (tmux 3.2+ display-popup)
# Force a login shell (-l) so ~/.bash_profile -> ~/.bashrc.ftw actually loads
# (aliases, parse_git_branch, PS1, etc.) — display-popup's default shell is
# interactive but non-login, which skips .bash_profile entirely.
bind-key g display-popup -E -w 80% -h 80% "bash -l"

# Enable synchronized output / passthrough in tmux
set-option -g allow-passthrough on
set-option -as terminal-features ',*:sync'

# Extended keys (CSI u): lets apps inside tmux distinguish e.g. Shift+Enter
# from plain Enter (Claude Code uses Shift+Enter for newline-without-send).
# The terminal-features line tells tmux the OUTER terminal (iTerm2, TERM=xterm-*)
# supports extkeys so it forwards them instead of downgrading.
set-option -s extended-keys always
set-option -as terminal-features ',xterm*:extkeys'

# Reload config: handled by tmux-sensible, which auto-binds prefix + R (Shift-r) to
# source-file + a "Sourced ~/.tmux.conf!" message. No need to bind our own.
#bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

##
# TMUX Plugin Manager
# See: https://github.com/tmux-plugins/tpm
# bash-ftw Insallation Cheatsheet: install-tpm

# List of plugins - `<prefix> + I` to install plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect: also save pane contents (scrollback), not just layout
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum: auto-save every 15 min and auto-restore on tmux start
set -g @continuum-restore 'on'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
